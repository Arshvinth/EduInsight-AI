services:
  db:
    image: pgvector/pgvector:pg17
    container_name: eduinsight_db

    restart: unless-stopped

    environment:
      POSTGRES_DB: eduinsight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ashwin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: eduinsight_pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduinsight.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - db

volumes:
  postgres_data: